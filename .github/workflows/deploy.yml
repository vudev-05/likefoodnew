name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

# DEV-002: Continuous Deployment pipeline
# Auto-deploys to production when CI passes on main branch

jobs:
  # Run CI first
  ci:
    uses: ./.github/workflows/ci.yml

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.REGISTRY_URL }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build & Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.REGISTRY_URL }}/likefood:latest
            ${{ secrets.REGISTRY_URL }}/likefood:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Deploy to Server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /opt/likefood

            # Pull latest image
            docker compose pull app

            # Run database migrations
            docker compose run --rm app npx prisma migrate deploy

            # Restart with zero downtime
            docker compose up -d --no-deps app

            # Health check
            sleep 10
            curl -sf http://localhost:3000/api/health || exit 1

            echo "✅ Deployment successful: ${{ github.sha }}"

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "🔴 LIKEFOOD deployment failed! Commit: ${{ github.sha }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
